<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricWebb - Watermark Player</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins',sans-serif; background:#f0f2f5; }
        .header { background:#001f3f; color:#fff; padding:15px; display:flex; align-items:center; position:sticky; top:0; z-index:100; }
        .logo { font-size:24px; font-weight:700; color:#28a745; margin-left:10px; }
        
        /* Player & Watermark Styling */
        #player-container { display:none; background:#000; padding:10px; position:sticky; top:60px; z-index:99; box-shadow:0 5px 15px rgba(0,0,0,0.5); }
        .video-wrapper { position: relative; width: 100%; height: 250px; border-radius: 8px; overflow: hidden; }
        iframe { width:100%; height:100%; border:none; }
        
        /* Chota Watermark Text */
        .watermark { 
            position: absolute; 
            bottom: 10px; 
            right: 15px; 
            color: rgba(255, 255, 255, 0.4); /* Halka white color */
            font-size: 12px; 
            font-weight: bold; 
            pointer-events: none; /* Taake koi click kare to video na ruke */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .close-btn { background:#ef5350; color:#fff; border:none; padding:5px 15px; border-radius:4px; margin-bottom:10px; cursor:pointer; font-weight:bold; }

        #content-area { 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }

        .card { background:#fff; border-radius:12px; padding:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); border-top:5px solid #ef5350; position: relative; }
        .match-title { font-size:16px; font-weight:700; margin:10px 0; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .s-btn { text-decoration:none; color:#fff; text-align:center; padding:8px 2px; border-radius:4px; font-size:10px; font-weight:600; background:#2c3e50; cursor:pointer; }
        .b-special { background:#ff5722; }
    </style>
</head>
<body>
    <div class="header"><i class="fas fa-bars"></i> <span class="logo">CricWebb</span></div>
    
    <div id="player-container">
        <button class="close-btn" onclick="closePlayer()">CLOSE PLAYER X</button>
        <div class="video-wrapper">
            <div id="video-box" style="height: 100%;"></div>
            <div class="watermark">CricWebb.Live</div>
        </div>
    </div>

    <div id="content-area"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCEg2IJax96IMMsREqEX85_zHRkVqFLcN0",
            authDomain: "cricwebb.firebaseapp.com",
            databaseURL: "https://cricwebb-default-rtdb.firebaseio.com",
            projectId: "cricwebb",
            storageBucket: "cricwebb.firebasestorage.app",
            messagingSenderId: "931715470347",
            appId: "1:931715470347:web:68bf78f3f7abde18cbe30e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref("matches").on("value", (snap) => {
            const area = document.getElementById('content-area');
            area.innerHTML = "";
            snap.forEach((child) => {
                const d = child.val();
                area.innerHTML += `
                    <div class="card">
                        <span style="color:#ef5350; font-size:10px; font-weight:bold;">${d.series || 'LIVE'}</span>
                        <div class="match-title">${d.team1} vs ${d.team2}</div>
                        <div class="btn-grid">
                            ${d.link1 ? `<div onclick="playVideo('${d.link1}')" class="s-btn">Server 1</div>` : ''}
                            ${d.link2 ? `<div onclick="playVideo('${d.link2}')" class="s-btn">Server 2</div>` : ''}
                            ${d.link3 ? `<div onclick="playVideo('${d.link3}')" class="s-btn">Server 3</div>` : ''}
                        </div>
                    </div>`;
            });
        });

        function playVideo(url) {
            const container = document.getElementById('player-container');
            const box = document.getElementById('video-box');
            container.style.display = "block";
            box.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function closePlayer() {
            document.getElementById('player-container').style.display = "none";
            document.getElementById('video-box').innerHTML = "";
        }
    </script>
</body>
</html>
