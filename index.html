<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricWebb - Left Aligned</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 10px;
        }

        .header {
            background-color: #001f3f;
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .header h1 {
            color: #fff;
            margin: 0;
            font-size: 24px;
            font-style: italic;
            text-align: left; /* Header bhi left par */
        }

        /* Match Grid - Left Aligned */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 340px)); /* Fixed width cards */
            gap: 20px;
            justify-content: start; /* Ye cards ko left par rakhega */
            max-width: 100%;
            margin: 0; /* Center margin hata diya */
        }

        .card {
            border: 1px solid #e0e0e0;
            padding: 15px;
            background: #fff;
            text-align: left; /* Sara text left par */
        }

        .logos {
            display: flex;
            justify-content: flex-start; /* Logos left se shuru honge */
            align-items: center;
            gap: 25px;
            margin-bottom: 15px;
        }

        .logos img {
            width: 70px;
            height: 70px;
            object-fit: contain;
        }

        .vs {
            font-weight: bold;
            color: #777;
            font-size: 16px;
        }

        .series-name {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
            display: block;
        }

        .live-row {
            display: flex;
            align-items: flex-start;
            gap: 5px;
            margin-bottom: 10px;
        }

        .live-tag {
            background-color: #28a745;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            font-weight: bold;
            white-space: nowrap;
            border-radius: 2px;
        }

        .match-title {
            font-size: 15px;
            font-weight: bold;
            color: #000;
            line-height: 1.3;
        }

        .venue {
            font-size: 11px;
            color: #888;
            margin-bottom: 15px;
        }

        .btn-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-bottom: 8px;
        }

        .btn {
            text-decoration: none;
            color: white;
            font-size: 11px;
            padding: 8px 2px;
            text-align: center;
            font-weight: bold;
            border-radius: 2px;
            text-transform: uppercase;
        }

        .q-btn { background-color: #333; }
        .s-btn { background-color: #3498db; }
        .p-btn { background-color: #e67e22; }

        .btn:hover { opacity: 0.85; }

    </style>
</head>
<body>

    <div class="header">
        <h1>CricWebb</h1>
    </div>

    <div class="match-grid" id="match-list">
        </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('matches').on('value', (snapshot) => {
            const list = document.getElementById('match-list');
            list.innerHTML = '';
            const data = snapshot.val();

            for (let id in data) {
                const m = data[id];
                list.innerHTML += `
                    <div class="card">
                        <div class="logos">
                            <img src="${m.T1_Logo}">
                            <span class="vs">VS</span>
                            <img src="${m.T2_Logo}">
                        </div>

                        <span class="series-name">${m.Series || 'Cricket Series 2026'}</span>
                        
                        <div class="live-row">
                            <span class="live-tag">LIVE STREAMING</span>
                            <span class="match-title">${m.Title}</span>
                        </div>

                        <div class="venue">${m.Venue || 'Live from Stadium'}</div>

                        <div class="btn-container">
                            <a href="${m.Low}" class="btn q-btn">Low Quality</a>
                            <a href="${m.Medium}" class="btn q-btn">Medium Quality</a>
                            <a href="${m.High}" class="btn q-btn">High Quality</a>
                        </div>

                        <div class="btn-container">
                            <a href="${m.Server1}" class="btn s-btn">Server 1</a>
                            <a href="${m.Server2}" class="btn s-btn">Server 2</a>
                            <a href="${m.Special}" class="btn p-btn">PTV SPORTS</a>
                        </div>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
