<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cric Web - Live Hub</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* Dark Professional Background */
        body { 
            background: #121212; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            color: #e0e0e0; 
        }
        
        .header { background: #1a1a1a; padding: 15px; border-bottom: 3px solid #d31d43; text-align: center; }
        .logo-text { color: #fff; font-size: 26px; font-weight: bold; }
        .logo-text span { color: #00bff3; }

        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; padding: 20px; max-width: 1200px; margin: auto; 
        }
        
        /* Dark Theme Cards */
        .match-card { 
            background: #1e1e1e; 
            border: 1px solid #333; 
            border-radius: 8px; 
            padding: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .teams-row { display: flex; justify-content: space-around; align-items: center; margin: 10px 0; }
        .teams-row img { width: 70px; height: 70px; object-fit: contain; background: #fff; border-radius: 50%; padding: 3px; }
        .vs { font-weight: bold; color: #555; }
        
        .status-badge { padding: 4px 10px; font-size: 10px; font-weight: bold; color: #000; border-radius: 4px; text-transform: uppercase; float: right; }
        .live { background: #00ff88; }
        .ended { background: #ff4444; color: #fff; }

        .match-title { font-size: 16px; font-weight: bold; color: #fff; margin: 10px 0; min-height: 40px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 10px; }
        .btn { padding: 8px 2px; font-size: 10px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; color: #fff; text-transform: uppercase; transition: 0.2s; }
        .btn-black { background: #333; }
        .btn-blue { background: #007bff; }
        .btn-orange { background: #ff5722; }

        /* Modal Styles */
        #player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        .player-wrapper { width: 100%; max-width: 900px; margin: 20px auto; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-text"><span>CRIC</span> WEB</div>
</div>

<div class="container" id="match-grid"></div>

<div id="player-modal">
    <div style="padding: 10px; text-align: right;"><span style="color:#fff; font-size:30px; cursor:pointer;" onclick="closeStream()">&times;</span></div>
    <div class="player-wrapper">
        <iframe id="video-frame" src="" allowfullscreen></iframe>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cricwebb-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    
    firebase.database().ref('AllMatches').on('value', (snapshot) => {
        const grid = document.getElementById('match-grid');
        grid.innerHTML = "";
        snapshot.forEach((child) => {
            const m = child.val();
            const isLive = (m.Status || "").toLowerCase() === "live";
            
            grid.innerHTML += `
                <div class="match-card">
                    <span class="status-badge ${isLive ? 'live' : 'ended'}">${m.Status}</span>
                    <div class="teams-row">
                        <img src="${m.T1_Logo || ''}" alt="T1">
                        <div class="vs">VS</div>
                        <img src="${m.T2_Logo || ''}" alt="T2">
                    </div>
                    <div class="match-title">${m.Title}</div>
                    <div class="btn-grid">
                        <button class="btn btn-black" onclick="play('${m.Low}')">Low</button>
                        <button class="btn btn-black" onclick="play('${m.High}')">Med</button>
                        <button class="btn btn-black" onclick="play('${m.High}')">High</button>
                        <button class="btn btn-blue" onclick="play('${m.High}')">Server 2</button>
                        <button class="btn btn-blue" onclick="play('${m.High}')">Server 3</button>
                        <button class="btn btn-orange" onclick="play('${m.High}')">PTV</button>
                    </div>
                </div>
            `;
        });
    });

    function play(url) {
        document.getElementById('video-frame').src = url;
        document.getElementById('player-modal').style.display = 'block';
    }

    function closeStream() {
        document.getElementById('video-frame').src = "";
        document.getElementById('player-modal').style.display = 'none';
    }
</script>
</body>
</html>
