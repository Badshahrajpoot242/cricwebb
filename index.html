<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricWebb - Live Streaming</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        /* WebCric Style Theme */
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 10px;
            color: #333;
        }

        .header-bar {
            background-color: #001f3f;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: auto;
        }

        .match-card {
            border: 1px solid #e0e0e0;
            padding: 15px;
            background: #fff;
            position: relative;
        }

        /* Top Logos Section */
        .teams-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .team-box {
            text-align: center;
        }

        .team-box img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .vs-text {
            font-size: 20px;
            font-weight: bold;
            color: #666;
        }

        /* Status Label Like WebCric */
        .live-label {
            background-color: #28a745;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        /* Title & Info */
        .match-title {
            font-size: 16px;
            font-weight: bold;
            color: #000;
            margin: 5px 0;
            display: block;
        }

        .venue-text {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }

        /* Buttons Style */
        .btn-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-bottom: 8px;
        }

        .btn {
            text-decoration: none;
            color: white;
            font-size: 12px;
            padding: 8px 2px;
            text-align: center;
            font-weight: bold;
            border-radius: 2px;
        }

        /* Quality Buttons (Black/Grey) */
        .btn-q { background-color: #333333; }
        /* Server Buttons (Blue) */
        .btn-s { background-color: #007bff; }
        /* Special Button (Orange/Red) */
        .btn-p { background-color: #ff5722; }

        .btn:hover { opacity: 0.9; }

    </style>
</head>
<body>

    <div class="header-bar">CricWebb</div>

    <div class="match-grid" id="matches">
        </div>

    <script>
        // --- APNA FIREBASE CONFIG YAHAN DAALEIN ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function fetchMatches() {
            const container = document.getElementById('matches');

            db.ref('matches').on('value', (snapshot) => {
                container.innerHTML = '';
                const data = snapshot.val();

                for (let key in data) {
                    const m = data[key];
                    const card = `
                        <div class="match-card">
                            <div class="live-label">LIVE STREAMING</div>
                            
                            <div class="teams-row">
                                <div class="team-box"><img src="${m.T1_Logo}"></div>
                                <div class="vs-text">VS</div>
                                <div class="team-box"><img src="${m.T2_Logo}"></div>
                            </div>

                            <div class="match-title">${m.Title}</div>
                            <div class="venue-text">${m.Venue || 'Live from Stadium'}</div>

                            <div class="btn-row">
                                <a href="${m.Low}" class="btn btn-q">Low Quality</a>
                                <a href="${m.Medium}" class="btn btn-q">Medium Quality</a>
                                <a href="${m.High}" class="btn btn-q">High Quality</a>
                            </div>

                            <div class="btn-row">
                                <a href="${m.Server1}" class="btn btn-s">Server 1</a>
                                <a href="${m.Server2}" class="btn btn-s">Server 2</a>
                                <a href="${m.Special}" class="btn btn-p">PTV SPORTS</a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                }
            });
        }

        fetchMatches();
    </script>
</body>
</html>
