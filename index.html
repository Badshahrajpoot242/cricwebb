<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricWebb - Complete Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins',sans-serif; background:#f0f2f5; }
        .header { background:#001f3f; color:#fff; padding:15px; display:flex; align-items:center; position:sticky; top:0; z-index:100; }
        .logo { font-size:24px; font-weight:700; color:#28a745; margin-left:10px; font-style:italic; }
        
        /* Player & Watermark */
        #player-container { display:none; background:#000; padding:10px; position:sticky; top:55px; z-index:99; }
        .video-wrapper { position: relative; width: 100%; height: 250px; border-radius: 8px; overflow: hidden; }
        iframe { width:100%; height:100%; border:none; }
        .watermark { position: absolute; bottom: 10px; right: 15px; color: rgba(255, 255, 255, 0.4); font-size: 12px; font-weight: bold; pointer-events: none; }

        /* Grid System */
        #content-area { 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
            min-height: 70vh;
        }

        .card { background:#fff; border-radius:12px; padding:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); border-top:5px solid #ef5350; display: flex; flex-direction: column; }
        .match-title { font-size:16px; font-weight:700; margin:10px 0; }
        
        /* All Buttons Style */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
        .s-btn { text-decoration:none; color:#fff; text-align:center; padding:8px 2px; border-radius:4px; font-size:10px; font-weight:600; cursor:pointer; text-transform: uppercase; }
        .b-dark { background:#2c3e50; }
        .b-blue { background:#3498db; }
        .b-orange { background:#ff5722; }

        /* Footer & Extra Links */
        .footer { background:#001f3f; color:#fff; padding:20px; text-align:center; margin-top:30px; border-top: 3px solid #28a745; }
        .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .footer-links a { color: #ccc; text-decoration: none; font-size: 12px; }
        .download-btn { background:#28a745; color:#fff; padding:10px 20px; border-radius:20px; text-decoration:none; display:inline-block; font-weight:bold; margin-top:10px; }

        .close-btn { background:#ef5350; color:#fff; border:none; padding:5px 15px; border-radius:4px; margin-bottom:10px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>
    <div class="header"><i class="fas fa-bars"></i> <span class="logo">CricWebb</span></div>
    
    <div id="player-container">
        <button class="close-btn" onclick="closePlayer()">CLOSE PLAYER X</button>
        <div class="video-wrapper">
            <div id="video-box" style="height: 100%;"></div>
            <div class="watermark">CricWebb.Live</div>
        </div>
    </div>

    <div id="content-area"></div>

    <footer class="footer">
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="mailto:yourgmail@gmail.com">Contact Us</a>
            <a href="#">DMCA</a>
            <a href="#">About Us</a>
        </div>
        <a href="YOUR_APP_LINK_HERE" class="download-btn"><i class="fab fa-android"></i> DOWNLOAD APP</a>
        <p style="font-size:10px; color:#666; margin-top:15px;">© 2026 CricWebb - All Rights Reserved</p>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCEg2IJax96IMMsREqEX85_zHRkVqFLcN0",
            authDomain: "cricwebb.firebaseapp.com",
            databaseURL: "https://cricwebb-default-rtdb.firebaseio.com",
            projectId: "cricwebb",
            storageBucket: "cricwebb.firebasestorage.app",
            messagingSenderId: "931715470347",
            appId: "1:931715470347:web:68bf78f3f7abde18cbe30e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref("matches").on("value", (snap) => {
            const area = document.getElementById('content-area');
            area.innerHTML = "";
            snap.forEach((child) => {
                const d = child.val();
                let btns = "";
                
                // Sab Buttons check kar rahe hain
                if(d.link1) btns += `<div onclick="playVideo('${d.link1}')" class="s-btn b-dark">Server 1</div>`;
                if(d.link2) btns += `<div onclick="playVideo('${d.link2}')" class="s-btn b-dark">Server 2</div>`;
                if(d.link3) btns += `<div onclick="playVideo('${d.link3}')" class="s-btn b-dark">Server 3</div>`;
                if(d.high) btns += `<div onclick="playVideo('${d.high}')" class="s-btn b-blue">High QH</div>`;
                if(d.medium) btns += `<div onclick="playVideo('${d.medium}')" class="s-btn b-blue">Med QM</div>`;
                if(d.low) btns += `<div onclick="playVideo('${d.low}')" class="s-btn b-blue">Low QL</div>`;
                if(d.sky) btns += `<div onclick="playVideo('${d.sky}')" class="s-btn b-orange">Sky Sports</div>`;
                if(d.willow) btns += `<div onclick="playVideo('${d.willow}')" class="s-btn b-orange">Willow</div>`;

                area.innerHTML += `
                    <div class="card">
                        <span style="color:#ef5350; font-size:10px; font-weight:bold;">${d.series || 'LIVE MATCH'}</span>
                        <div class="match-title">${d.team1} vs ${d.team2}</div>
                        <div class="btn-grid">${btns}</div>
                    </div>`;
            });
        });

        function playVideo(url) {
            const container = document.getElementById('player-container');
            const box = document.getElementById('video-box');
            container.style.display = "block";
            box.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function closePlayer() {
            document.getElementById('player-container').style.display = "none";
            document.getElementById('video-box').innerHTML = "";
        }
    </script>
</body>
</html>
