<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCric Clone - Live Cricket</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #f0f2f5; font-family: Arial, sans-serif; margin: 0; padding: 0; color: #333; }
        .header { background: #222; padding: 10px; border-bottom: 4px solid #ff0055; text-align: left; }
        .header img { height: 40px; margin-left: 10px; }
        
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; padding: 15px; max-width: 1100px; margin: auto; }
        
        /* Card Style like WebCric */
        .match-card { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        
        .teams-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .teams-row img { width: 70px; height: 70px; object-fit: contain; }
        .vs-text { font-weight: bold; color: #777; font-size: 18px; }
        
        .series-info { font-size: 11px; color: #666; margin-bottom: 5px; line-height: 1.2; text-align: left; }
        .match-title { font-size: 15px; font-weight: bold; color: #222; text-align: left; margin-bottom: 5px; }
        
        .status-badge { display: inline-block; padding: 2px 6px; font-size: 10px; font-weight: bold; color: #fff; border-radius: 3px; margin-bottom: 5px; text-transform: uppercase; float: left; }
        .live { background: #4caf50; }
        .ended { background: #f44336; }
        
        /* Buttons Style */
        .btn-container { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; clear: both; }
        .btn { padding: 4px 8px; font-size: 11px; font-weight: bold; border: none; border-radius: 2px; cursor: pointer; color: #fff; flex: 1 1 30%; }
        .btn-quality { background: #333; }
        .btn-server { background: #007bff; }
        .btn-tv { background: #ff5722; }

        #player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .player-content { width: 95%; max-width: 850px; margin: 50px auto; position: relative; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; background: #000; }
        .close { color: #fff; position: absolute; top: -35px; right: 0; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://go.webcric.com/images/webcric_logo.png" alt="WebCric">
</div>

<div class="container" id="grid"></div>

<div id="player-modal">
    <div class="player-content">
        <span class="close" onclick="closeStream()">&times;</span>
        <iframe id="video-frame" src="" allowfullscreen></iframe>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cricwebb-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    
    firebase.database().ref('AllMatches').on('value', (snapshot) => {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        snapshot.forEach((child) => {
            const m = child.val();
            const isLive = (m.Status || "").toLowerCase() === "live";
            const statusLabel = isLive ? "LIVE STREAM" : "SERIES END";
            const statusClass = isLive ? "live" : "ended";

            grid.innerHTML += `
                <div class="match-card">
                    <div class="teams-row">
                        <img src="${m.T1_Logo || ''}">
                        <div class="vs-text">VS</div>
                        <img src="${m.T2_Logo || ''}">
                    </div>
                    <div class="series-info">International Cricket Series 2026 Live Streaming</div>
                    <div class="status-badge ${statusClass}">${statusLabel}</div>
                    <div class="match-title" style="clear:both;">${m.Title}</div>
                    
                    <div class="btn-container">
                        <button class="btn btn-quality" onclick="play('${m.Low}')">Low Quality</button>
                        <button class="btn btn-quality" onclick="play('${m.High}')">Medium Quality</button>
                        <button class="btn btn-quality" onclick="play('${m.High}')">High Quality</button>
                        <button class="btn btn-server" onclick="play('${m.High}')">Server 2</button>
                        <button class="btn btn-server" onclick="play('${m.High}')">Server 3</button>
                        <button class="btn btn-tv" onclick="play('${m.High}')">PTV SPORTS</button>
                    </div>
                </div>
            `;
        });
    });

    function play(url) {
        if(!url || url === "undefined") return alert("Link not found in Firebase!");
        document.getElementById('video-frame').src = url;
        document.getElementById('player-modal').style.display = 'block';
    }

    function closeStream() {
        document.getElementById('video-frame').src = "";
        document.getElementById('player-modal').style.display = 'none';
    }
</script>
</body>
</html>
