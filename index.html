<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricWebb - Live Streaming</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 15px;
        }

        .header {
            background-color: #001f3f;
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .header h1 {
            color: #fff;
            margin: 0;
            font-size: 24px;
            font-style: italic;
            text-align: left;
        }

        /* Match Grid - WebCric Style */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 360px));
            gap: 25px;
            justify-content: flex-start;
        }

        .card {
            border: 1px solid #f0f0f0;
            padding: 15px;
            background: #fff;
            transition: 0.3s;
        }

        .card:hover {
            border-color: #ccc;
        }

        .logos {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 12px;
        }

        .logos img {
            width: 75px;
            height: 75px;
            object-fit: contain;
        }

        .vs {
            font-size: 18px;
            color: #999;
            font-weight: bold;
        }

        .series-name {
            font-size: 11px;
            color: #555;
            margin-bottom: 5px;
            display: block;
            line-height: 1.2;
        }

        .live-tag {
            background-color: #28a745; /* WebCric Green */
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            font-weight: bold;
            border-radius: 2px;
            margin-right: 5px;
            vertical-align: middle;
        }

        .match-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            line-height: 1.4;
        }

        .venue {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .btn-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-bottom: 5px;
        }

        .btn {
            text-decoration: none;
            color: white;
            font-size: 11px;
            padding: 8px 2px;
            text-align: center;
            font-weight: bold;
            border-radius: 2px;
            text-transform: uppercase;
        }

        .q-btn { background-color: #333; } /* Quality Black */
        .s-btn { background-color: #3498db; } /* Server Blue */
        .p-btn { background-color: #ff5722; } /* PTV Sports Orange */

        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>

    <div class="header">
        <h1>CricWebb</h1>
    </div>

    <div class="match-grid" id="match-list">
        </div>

    <script>
        // Aapki Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB...", // Yahan apni API Key zaroor check kar lein
            authDomain: "cric-webb.firebaseapp.com",
            databaseURL: "https://cric-webb-default-rtdb.firebaseio.com",
            projectId: "cric-webb",
            storageBucket: "cric-webb.appspot.com",
            messagingSenderId: "367351405908",
            appId: "1:367351405908:web:86551b32d011502476b701"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function loadMatches() {
            const list = document.getElementById('match-list');
            
            // Firebase 'matches' node se data lena
            db.ref('matches').on('value', (snapshot) => {
                list.innerHTML = '';
                const data = snapshot.val();

                if (data) {
                    for (let id in data) {
                        const m = data[id];
                        list.innerHTML += `
                            <div class="card">
                                <div class="logos">
                                    <img src="${m.T1_Logo || ''}" alt="Team 1">
                                    <span class="vs">VS</span>
                                    <img src="${m.T2_Logo || ''}" alt="Team 2">
                                </div>

                                <span class="series-name">${m.Series || ''}</span>
                                
                                <div>
                                    <span class="live-tag">LIVE STREAMING</span>
                                    <span class="match-title">${m.Title || 'Match Title'}</span>
                                </div>

                                <div class="venue">${m.Venue || 'Live from Stadium'}</div>

                                <div class="btn-container">
                                    <a href="${m.Low || '#'}" target="_blank" class="btn q-btn">Low Quality</a>
                                    <a href="${m.Medium || '#'}" target="_blank" class="btn q-btn">Medium Quality</a>
                                    <a href="${m.High || '#'}" target="_blank" class="btn q-btn">High Quality</a>
                                </div>

                                <div class="btn-container">
                                    <a href="${m.Server1 || '#'}" target="_blank" class="btn s-btn">Server 1</a>
                                    <a href="${m.Server2 || '#'}" target="_blank" class="btn s-btn">Server 2</a>
                                    <a href="${m.Special || '#'}" target="_blank" class="btn p-btn">PTV SPORTS</a>
                                </div>
                            </div>
                        `;
                    }
                } else {
                    list.innerHTML = '<p style="padding:20px;">Matches are currently not available. Please check Firebase.</p>';
                }
            });
        }

        loadMatches();
    </script>
</body>
</html>
